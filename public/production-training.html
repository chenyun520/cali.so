    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        }
        
        /* =========================================================
           全新双引擎交叉渲染架构 (Dual-Iframe Crossfade)
           彻底干掉 Loading，实现电影级平滑转场
           =========================================================
        */
        .presentation-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; outline: none;
            background-color: #1a1a1a;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
            pointer-events: none; /* 隐藏状态下不抢夺焦点 */
        }
        
        .presentation-frame.active {
            opacity: 1;
            z-index: 2;
            pointer-events: auto; /* 激活状态下响应交互 */
        }
    </style>
</head>

            <div class="bottom-action-area step-4">
                <div class="speaker-info">
                    <div class="name">陈 云</div>
                    <div class="title">Standardized Control System</div>
                </div>
                <div class="apple-button-container">
                    <div class="button-wrap">
                        <button class="button" onclick="nextStep()"><span class="span">ENTER MODULE</span></button>
                        <div class="button-shadow"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let currentStep = 0; const maxSteps = 4;
        function updateCanvas() {
            for (let i = 1; i <= maxSteps; i++) {
                document.querySelectorAll(`.step-${i}`).forEach(el => {
                    if (currentStep >= i) el.classList.add('visible');
                    else el.classList.remove('visible');
                });
            }
        }
        function nextStep() { if (currentStep < maxSteps) { currentStep++; updateCanvas(); } else { window.parent.postMessage('NEXT', '*'); } }
        function prevStep() { if (currentStep > 0) { currentStep--; updateCanvas(); } else { window.parent.postMessage('PREV', '*'); } }
        document.addEventListener('keydown', (e) => {
            if (['ArrowRight', 'ArrowDown', 'PageDown', ' ', 'Enter'].includes(e.key)) { e.preventDefault(); nextStep(); }
            else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); prevStep(); }
        });
        document.getElementById('canvas-container').addEventListener('click', (e) => { if (!e.target.closest('.button')) { nextStep(); } });
        setTimeout(nextStep, 100); 
    </script>
</body>

        let currentStep = 1; 
        const maxSteps = 11;

        function updateCanvas() {
            const container = document.getElementById('canvas-container');
            container.className = `state-${currentStep}`;
        }

        function nextStep() { 
            if (currentStep < maxSteps) { currentStep++; updateCanvas(); } else { window.parent.postMessage('NEXT', '*'); }
        }
        function prevStep() { 
            if (currentStep > 1) { currentStep--; updateCanvas(); } else { window.parent.postMessage('PREV', '*'); }
        }
        
        document.addEventListener('keydown', (e) => {
            if (['ArrowRight', 'ArrowDown', 'PageDown', ' ', 'Enter'].includes(e.key)) { e.preventDefault(); nextStep(); }
            else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); prevStep(); }
        });
        document.getElementById('canvas-container').addEventListener('click', nextStep);
        
    </script>

                    <div class="a3-desc">源于丰田生产方式（TPS），因报告统一浓缩在标准 A3 纸上而得名。其核心逻辑完美契合了戴明环理论。通过高度可视化的图表，它强迫管理者剔除冗余情绪，用客观逻辑穿透复杂问题。</div>
                    <div class="pdca-tags"><div class="p-tag">P - Plan</div><div class="p-tag">D - Do</div><div class="p-tag">C - Check</div><div class="p-tag">A - Act</div></div>
                </div>

        <div class="scene scene-3">
            <div class="a3-blueprint">
                <div class="a3-header">
                    <div class="a3-h-title">A3 Problem Solving Report</div>
                    <div class="a3-h-meta">Case: Haers 保温杯特定型号真空度波动分析 | Owner: 生产工程部</div>
                </div>
                <div class="step-box box-1">
                    <div class="sb-head"><div class="sb-num">1</div><div class="sb-title">定义问题与背景 (Background)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-crosshairs"></i></div>
                    <div class="sb-content"><strong>现象描述：</strong>本周 T 型保温杯在抽真空工序后，真空合格率由基准的 99.5% 异常跌至 94%。<br><strong>业务影响：</strong>单班次产生大量废品，严重威胁本月交付成本与订单准交率。</div>
                </div>
                <div class="step-box box-2">
                    <div class="sb-head"><div class="sb-num">2</div><div class="sb-title">现状分析 (Current State)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-chart-pie"></i></div>
                    <div class="sb-content">绘制抽真空工序物理流程图，并在现场(Gemba)收集数据。<br>发现：不合格品均集中在 3 号真空炉，且不良发生时间主要在炉温爬升阶段的后半段。</div>
                </div>
                <div class="step-box box-3">
                    <div class="sb-head"><div class="sb-num">3</div><div class="sb-title">设定目标 (Target - SMART)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-flag"></i></div>
                    <div class="sb-content"><strong>S (具体):</strong> 解决 3 号真空炉温度波动导致的真空度不良。<br><strong>T (时间):</strong> 在 30 天内 (即本月 30 日前)。<br><strong>M (可衡量):</strong> 将该型号真空合格率恢复并稳定在 99.5% 以上。</div>
                </div>
                <div class="step-box box-4">
                    <div class="sb-head"><div class="sb-num">4</div><div class="sb-title">根本原因分析 (Root Cause)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-magnifying-glass"></i></div>
                    <div class="sb-content" style="color: #FF3B30;"><strong style="font-size: 18px;">坚决摒弃“员工粗心”的主观归因！</strong>运用 5 Whys 连续追问：<br>W1: 真空度为何不达标？ → W2: 3号炉内温度分布不均。<br>W3: 加热衰减？(否)/密封微漏？(是) → W4: 密封圈老化。<br><strong>真因：设备SOP中缺乏针对高温密封圈寿命周期的强制更换标准。</strong></div>
                </div>
                <div class="step-box box-5">
                    <div class="sb-head"><div class="sb-num">5</div><div class="sb-title">制定对策与防错 (Countermeasures)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-shield-halved"></i></div>
                    <div class="sb-content"><strong style="color: #34C759; font-size: 18px;">系统级防错机制 (Poka-Yoke)：</strong><br>1. 硬件：全面更换新型耐高温材质密封圈。<br>2. 系统：PLC写入互锁程序。该密封圈运行达500小时，系统亮红灯强制锁机，换新后方可复位。</div>
                </div>
                <div class="step-box box-6">
                    <div class="sb-head"><div class="sb-num">6</div><div class="sb-title">实施计划 (Implementation)</div></div>
                    <div class="sb-placeholder"><i class="fa-solid fa-list-check"></i></div>
                    <div class="sb-content">利用甘特图明确行动边界：<br>• 采购新密封圈：张工 (本周三前)<br>• PLC 程序修改验证：李工 (本周五前)<br>• 操作工赋能培训：王班长 (下周一早会)</div>
                </div>
                <div class="step-box box-7">

            else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); prevStep(); }
        });
        document.getElementById('canvas-container').addEventListener('click', nextStep);

        const canvas = document.getElementById('warp-canvas'); const ctx = canvas.getContext('2d');
        let warpAnimationId; let particles = []; let isWarping = false;
        function initWarp() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = []; for (let i = 0; i < 400; i++) { particles.push({ x: Math.random() * canvas.width - canvas.width / 2, y: Math.random() * canvas.height - canvas.height / 2, z: Math.random() * 2000, pz: Math.random() * 2000 }); } }
        function startWarpEngine() { if (isWarping) return; isWarping = true; initWarp(); animateWarp(); }
        function stopWarpEngine() { isWarping = false; cancelAnimationFrame(warpAnimationId); ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function animateWarp() {
            if (!isWarping) return;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2; const cy = canvas.height / 2; const speed = 30;
            particles.forEach((p, i) => {
                p.pz = p.z; p.z -= speed;
                if (p.z < 1) { p.z = 2000; p.pz = 2000; p.x = Math.random() * canvas.width - cx; p.y = Math.random() * canvas.height - cy; }
                const fov = 300; const x = (p.x * fov) / p.z + cx; const y = (p.y * fov) / p.z + cy; const px = (p.x * fov) / p.pz + cx; const py = (p.y * fov) / p.pz + cy;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y);
                ctx.strokeStyle = i % 2 === 0 ? 'rgba(0, 47, 167, 0.8)' : 'rgba(255, 215, 0, 0.8)';
                ctx.lineWidth = (2000 - p.z) / 500; ctx.stroke();
            });
            warpAnimationId = requestAnimationFrame(animateWarp);
        }
        window.addEventListener('resize', () => { if (isWarping) initWarp(); });
        setTimeout(updateCanvas, 100);
    </script>
</body>

    <!-- ========================================================================= -->
    <!-- 主控程序 (Master Controller) -->
    <!-- ========================================================================= -->
    <script>
        // 核心更新：双引擎逻辑，彻底移除了 Loader
        const frame1 = document.getElementById('frame-1');
        const frame2 = document.getElementById('frame-2');
        let activeFrameId = 1;
        
        let currentIdx = 0;

        // 核心修复：动态提取并缓存每个页面的 HTML 内容，避免空指针报错
        const slideContents = [];
        let slideIndex = 0;
        
        while (true) {
            const template = document.getElementById('slide-' + slideIndex);
            if (!template) break; // 找不到更多幻灯片时自动跳出循环
            slideContents.push(template.innerHTML);
            slideIndex++;
        }
        
        const totalSlides = slideContents.length;

        // 核心：无闪烁平滑交叉渲染
        function loadSlide(idx) {
            if (idx < 0 || idx >= totalSlides) return;

            const currentFrame = activeFrameId === 1 ? frame1 : frame2;
            const nextFrameId = activeFrameId === 1 ? 2 : 1;
            const nextFrame = activeFrameId === 1 ? frame2 : frame1;

            // 在隐藏的 Iframe 中预加载下一页内容
            nextFrame.srcdoc = slideContents[idx];

            // 监听加载完成，执行平滑交叉淡入淡出
            nextFrame.onload = () => {
                nextFrame.classList.add('active'); // 新页面淡入并获取最高层级
                
                // 极微小的延迟后，老页面失去激活状态并淡出，确保视觉无断层
                setTimeout(() => {
                    currentFrame.classList.remove('active');
                }, 50);

                activeFrameId = nextFrameId;
                nextFrame.focus(); // 确保 Iframe 捕获后续的键盘焦点
            };
        }

        // 监听来自内部 Iframe 的翻页指令
        window.addEventListener('message', (e) => {
            if (e.data === 'NEXT') {
                if (currentIdx < totalSlides - 1) {
                    currentIdx++;
                    loadSlide(currentIdx);
                }
            } else if (e.data === 'PREV') {
                if (currentIdx > 0) {
                    currentIdx--;
                    loadSlide(currentIdx);
                }
            }
        });

        // 兜底的主页面键盘监听（以防点击画板外丢失焦点）
        window.addEventListener('keydown', (e) => {
            if (['ArrowRight', 'ArrowDown', 'PageDown'].includes(e.key)) {
                if (currentIdx < totalSlides - 1) {
                    currentIdx++;
                    loadSlide(currentIdx);
                }
            } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) {
                if (currentIdx > 0) {
                    currentIdx--;
                    loadSlide(currentIdx);
                }
            }
        });

        // 初始化加载第一页
        if (totalSlides > 0) {
            frame1.srcdoc = slideContents[0];
            frame1.onload = () => {
                frame1.classList.add('active');
                frame1.focus();
            };
        }
    </script>
</body>
